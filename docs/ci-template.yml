name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Node syntax (server.js + public/app.js)
        run: |
          node --check server.js
          node --check public/app.js
      - name: Python syntax (agents)
        run: |
          python3 -c "import ast; [ast.parse(open(f).read()) for f in ('tools/packet_agent.py','tools/serial_agent.py')]"

  decoder-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Run decoder unit tests
        run: python3 -m unittest tools.test_packet_agent -v

  example-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Build every example profile
        run: |
          set -e
          for f in examples/*.json; do
            python3 tools/packet_agent.py build < "$f" \
              | python3 -c "import sys,json;d=json.load(sys.stdin);assert d['ok'] is True, d;print('  ok:',sys.argv[1] if len(sys.argv)>1 else '')" "$f"
          done
